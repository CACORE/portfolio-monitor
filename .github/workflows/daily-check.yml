name: 每日再平衡檢查

on:
  schedule:
    - cron: '10 1 * * 1-5'  # 台灣時間 09:10，週一到週五

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python scripts/check.py
